# Site settings
title: 懒人洪生的博客<br/>这人真的很懒
header-img: "img/facebook.jpg"
tagline: "cn"
description: "懒人洪生"
baseurl: ""
url: "http://guanhauhong.github.io"

# About/contact
owner:
  name: "guanhuahong"
  email: guanhua.hong@outlook.com
  bio: "写为了记忆，写为了分享，写为了未来"

# Data
gavatar: http://dreamofbook.qiniudn.com/Az..png
favicon: img/favicon.png

douban_username:
twitter_username:
github_username: guanhuahong
facebook_username:
weibo_username: um856677
zhihu_username:

# Build settings
# use Github Flavored Markdown !important
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
highlighter: pygments
permalink: pretty
paginate: 8
exclude: ["less","node_modules","Gruntfile.js","package.json","README.md"]
# relative_permalinks: true  ### jekyll 3.0 no supper

# http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone: Asia/Shanghai

# Defaults for posts
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "CnFeat"
      header-img: "img/facebook.jpg" # We don't want posts without a header image, that whould mean white on white

# Comments
comments :
  provider : duoshuo
  duoshuo :
    short_name : cnfeat
  disqus :
      short_name : cnfeat

# Analytics and webmaster tools stuff goes here
google_analytics:
google_verify:
# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Links to include in footer navigation

gems: [jekyll-paginate]
